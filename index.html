<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  </head>

  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>GED Mathematics Practice</title>

      <style>
        body {
          font-family: Arial, sans-serif;
          background: #f4f6f9;
          margin: 0;
          padding: 0;
        }

        .container {
          width: 80%;
          max-width: 800px;
          margin: 40px auto;
          background: #ffffff;
          padding: 30px;
          border-radius: 10px;
          box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
        }

        h1 {
          text-align: center;
          color: #1f4e79;
        }

        .question-number {
          font-weight: bold;
          color: #555;
          margin-bottom: 20px;
        }

        .question {
          font-size: 22px;
          margin-bottom: 20px;
        }

        .option {
          margin: 15px 0;
          font-size: 18px;
        }

        button {
          padding: 12px 20px;
          margin: 10px;
          border: none;
          border-radius: 5px;
          background: #1f4e79;
          color: white;
          font-size: 16px;
          cursor: pointer;
        }

        button:hover {
          background: #2e75b6;
        }

        #result {
          margin-top: 20px;
          font-size: 20px;
          font-weight: bold;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>GED Mathematics Practice</h1>

        <div class="question-number">Question 1 of 10</div>

        <div class="question">
          Solve the equation:
          <br /><br />
          <strong>3x + 5 = 20</strong>
        </div>

        <form id="quizForm">
          <div class="option">
            <input type="radio" name="answer" value="A" />
            A. 3
          </div>

          <div class="option">
            <input type="radio" name="answer" value="B" />
            B. 5
          </div>

          <div class="option">
            <input type="radio" name="answer" value="C" />
            C. 6
          </div>

          <div class="option">
            <input type="radio" name="answer" value="D" />
            D. 8
          </div>

          <button type="button" onclick="checkAnswer()">Submit Answer</button>
        </form>

        <div id="result"></div>
      </div>

      <script>
        function checkAnswer() {
          let answer = document.querySelector('input[name="answer"]:checked');

          if (answer == null) {
            alert("Please select an answer.");
            return;
          }

          if (answer.value == "B") {
            document.getElementById("result").innerHTML =
              "✅ Correct!<br><br>Explanation: 3x + 5 = 20 → 3x = 15 → x = 5";
          } else {
            document.getElementById("result").innerHTML =
              "❌ Incorrect.<br><br>The correct answer is <b>B. 5</b>.<br><br>Explanation: 3x + 5 = 20 → 3x = 15 → x = 5";
          }
        }
      </script>
    </body>
  </html>
</html>
